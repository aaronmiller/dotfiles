[window]
dynamic_padding = true
startup_mode = "Fullscreen"

[window.padding]
x = 4
y = 4

[scrolling]
history = 100000

[font]
size = 12
[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style = "Bold Italic"

# Colors (Wilmersdorf + Palenight)
[colors]
[colors.bright]
black = "#434750"
blue = "#b2cff0"
cyan = "#69abc5"
green = "#8fd7d6"
magenta = "#efccfd"
red = "#fa7193"
white = "#d3d3d3"
yellow = "#d1dfff"

[colors.cursor]
cursor = "#819cd6"
text = "#1f2024"

[colors.normal]
black = "#1c1f2b"
blue = "#819cd6"
cyan = "#7289bc"
green = "#5b94ab"
magenta = "#a6c1e0"
red = "#e1c1ee"
white = "#a6accd"
yellow = "#cfcf9c"

[colors.primary]
background = "#292d3e"
foreground = "#eeffff"

[colors.selection]
background = "#1f2024"
text = "#eeffff"

[cursor]
thickness = 0.25
unfocused_hollow = false
[cursor.style]
blinking = "Always"
shape = "Beam"

[[keyboard.bindings]]
key = "Return"
mods = "Command"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Back"
mods = "Command"
chars = "\u0015"

[[keyboard.bindings]]
key = "Back"
mods = "Option"
chars = "\u001b\u007f"

[[keyboard.bindings]]
