[window]
dynamic_padding = true

[window.padding]
x = 4
y = 4

[scrolling]
history = 10000

[font]
size = 12

[font.normal]
family = "Hack"
style = "Regular"

[font.italic]
family = "Hack"
style = "Italic"

[font.bold]
family = "Hack"
style = "Bold"

[font.bold_italic]
family = "Hack"
style = "Bold Italic"

[cursor]
thickness = 0.20

[cursor.style]
shape = "Beam"
blinking = "Always"

# Colors (Wilmersdorf)
[colors.bright]
black = "#434750"
blue = "#b2cff0"
cyan = "#69abc5"
green = "#8fd7d6"
magenta = "#efccfd"
red = "#fa7193"
white = "#d3d3d3"
yellow = "#d1dfff"

[colors.cursor]
cursor = "#819cd6"
text = "#222228"

[colors.normal]
black = "#34373e"
blue = "#a6c1e0"
cyan = "#5b94ab"
green = "#7ebebd"
magenta = "#e1c1ee"
red = "#e06383"
white = "#ababab"
yellow = "#cccccc"

[colors.primary]
background = "#282b33"
foreground = "#c6c6c6"

[colors.selection]
background = "#9e9e9e"
text = "#222228"

[[keyboard.bindings]]
key = "Return"
mods = "Command"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

# Delete line
[[keyboard.bindings]]
key = "Back"
mods = "Command"
chars = "\u0015"

# Delete word
[[keyboard.bindings]]
key = "Back"
mods = "Option"
chars = "\u001b\u007f"

# Go to beginning of line
[[keyboard.bindings]]
key = "Left"
mods = "Command"
chars = "\u0001"

# Go to end of line
[[keyboard.bindings]]
key = "Right"
mods = "Command"
chars = "\u0005"

# Go back one word
[[keyboard.bindings]]
key = "Left"
mods = "Option"
chars = "\u001bb"

# Go forward one word
[[keyboard.bindings]]
key = "Right"
mods = "Option"
chars = "\u001bf"

# Tmux keybindings
# Create new window
[[keyboard.bindings]]
key = "T"
mods = "Command"
chars = "\u0002c"

# Break current tmux pane out of the tmux window
[[keyboard.bindings]]
key = "T"
mods = "Command|Shift"
chars = "\u0002!"

# Delete current window
[[keyboard.bindings]]
key = "W"
mods = "Command"
chars = "\u0002w"

# Split pane vertically
[[keyboard.bindings]]
key = "D"
mods = "Command"
chars = "\u0002%"

# Split pane horizontally
[[keyboard.bindings]]
key = "D"
mods = "Command|Shift"
chars = "\u0002\""

# Go to previous window
[[keyboard.bindings]]
key = "Left"
mods = "Command|Option"
chars = "\u0002p"

# Go to next window
[[keyboard.bindings]]
key = "Right"
mods = "Command|Option"
chars = "\u0002n"

# List sessions
[[keyboard.bindings]]
key = "L"
mods = "Command"
chars = "\u0002s"

# Swap windows going left
[[keyboard.bindings]]
key = "Comma"
mods = "Command"
chars = "\u0002,"

# Swap windows going right
[[keyboard.bindings]]
key = "Period"
mods = "Command"
chars = "\u0002."

# Resize panes
[[keyboard.bindings]]
key = "H"
mods = "Command|Option"
chars = "\u0002\b"

[[keyboard.bindings]]
key = "J"
mods = "Command|Option"
chars = """
\u0002
"""

[[keyboard.bindings]]
key = "K"
mods = "Command|Option"
chars = "\u0002"

[[keyboard.bindings]]
key = "L"
mods = "Command|Option"
chars = "\u0002\f"

# Cycle panes
[[keyboard.bindings]]
key = "LBracket"
mods = "Command|Option"
chars = "\u0002O"

[[keyboard.bindings]]
key = "RBracket"
mods = "Command|Option"
chars = "\u0002o"

# Cycle through windows 1-9
[[keyboard.bindings]]
key = "Key1"
mods = "Command"
chars = "\u00021"

[[keyboard.bindings]]
key = "Key2"
mods = "Command"
chars = "\u00022"

[[keyboard.bindings]]
key = "Key3"
mods = "Command"
chars = "\u00023"

[[keyboard.bindings]]
key = "Key4"
mods = "Command"
chars = "\u00024"

[[keyboard.bindings]]
key = "Key5"
mods = "Command"
chars = "\u00025"

[[keyboard.bindings]]
key = "Key6"
mods = "Command"
chars = "\u00026"

[[keyboard.bindings]]
key = "Key7"
mods = "Command"
chars = "\u00027"

[[keyboard.bindings]]
key = "Key8"
mods = "Command"
chars = "\u00028"

[[keyboard.bindings]]
key = "Key9"
mods = "Command"
chars = "\u00029"
